{% extends "layouts/base.html" %}

{% block content %}
<section class="docs-page docs-page--collection">
  <aside class="docs-page__meta">
    <section class="docs-rail-card">
      <div class="page__eyebrow">{{ collection|default:"collection" }}</div>
      <h1 class="page__title">{{ page_title }}</h1>
      {% if page_description %}<p class="page__summary">{{ page_description }}</p>{% endif %}
    </section>
    <section class="docs-rail-card">
      <p class="docs-rail-card__label">Mode</p>
      <p class="docs-rail-card__text">Technical archive for notes, posts, and reference material.</p>
    </section>
  </aside>
  <div class="docs-page__main">
    <section class="docs-page__content docs-page__content--collection">
      {{ content|safe }}
    </section>
  </div>
</section>
{% endblock %}
