name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install -e ./packages/wg-contracts
          python -m pip install -e ./packages/wg-core
          python -m pip install -e ./packages/wg-runtime
          python -m pip install -e ./packages/wg-commerce
          python -m pip install -e .[dev]
      - name: Run tests
        run: pytest
      - name: Check formatting with Ruff
        run: ruff format --check .
      - name: Run Ruff lint
        run: ruff check .
      - name: Run MyPy static typing
        run: python -m mypy packages/wg-core/core packages/wg-runtime/wg_runtime packages/wg-commerce/wg_commerce packages/wg-core/plugins
