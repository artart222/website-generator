[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "website-generator"
version = "0.2.0"
description = "Developer-first static website generator with theme packages and deep customization."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [
  { name = "Artin Mobasher" }
]
dependencies = [
  "asgiref==3.8.1",
  "beautifulsoup4==4.12.3",
  "colorama==0.4.6",
  "colorlog==6.10.1",
  "Django==5.2.1",
  "Markdown==3.8",
  "Pygments==2.19.1",
  "python-slugify==8.0.4",
  "PyYAML==6.0.2",
]

[project.optional-dependencies]
dev = [
  "pytest==8.4.1",
  "pytest-mock==3.14.1",
]

[project.scripts]
wg = "cli:main"

[tool.setuptools]
py-modules = ["cli", "main", "dev"]

[tool.setuptools.packages.find]
include = ["core*", "engines*", "plugins*", "processor*", "utils*"]
