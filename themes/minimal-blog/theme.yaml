name: minimal-blog
version: 1
engine: django
layouts:
  base: layouts/base.html
  document: layouts/document.html
  collection: layouts/collection.html
  not_found: layouts/404.html
assets:
  styles:
    base: styles/base.css
  static_dirs:
    - assets
tokens:
  colors:
    bg: "#1e2127"             # استخراج شده از background-color در body
    surface: "#282c34"        # استخراج شده از پس‌زمینه منو (nav-menu)
    text: "#abb2bf"           # استخراج شده از color در body
    muted: "#5c6370"          # استخراج شده از secondary-link و footer
    accent: "#61afef"         # استخراج شده از رنگ لینک‌ها (a)
    accent-contrast: "#282c34" # استخراج شده از رنگ متن دکمه (a.button)
    border: "#373c43"         # استخراج شده از رنگ navbar
  typography:
    body-family: "'Segoe UI', sans-serif"
    heading-family: "'Georgia', serif"
    font-size: "16px"
  spacing:
    container: "72rem"
    section: "4rem"
  radius:
    card: "24px"
    button: "999px"
  shadows:
    card: "0 18px 45px rgba(0, 0, 0, 0.30)"
presets:
  default:
    components:
      header: default
      footer: default
      cards: elevated
      blog_index: magazine
      post: prose
      buttons: rounded
  contrast:
    tokens:
      colors:
        bg: "#0f172a"
        surface: "#111827"
        text: "#f8fafc"
        muted: "#cbd5e1"
        accent: "#22c55e"
        accent-contrast: "#052e16"
        border: "#334155"
supports:
  blocks: true
  collection_index: true
blocks:
  core:
    - hero
    - rich_text
    - feature_grid
    - gallery
    - cta
    - faq
  custom:
    - minimal-blog/spotlight
