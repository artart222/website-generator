name: Code Quality

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install -e ./packages/wg-contracts
          python -m pip install -e ./packages/wg-core
          python -m pip install -e ./packages/wg-runtime
          python -m pip install -e ./packages/wg-commerce
          python -m pip install -e .[dev]
      - name: Run pylint
        env:
          DJANGO_DEBUG: "True"
        run: pylint --rcfile=.pylintrc --fail-under=8.0 --fail-on=E,F $(git ls-files '*.py')
