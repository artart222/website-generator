<section class="block block--grid">
  {% if block.content.title %}
  <h2 class="block__title">{{ block.content.title }}</h2>
  {% endif %}
  <div class="feature-grid">
    {% for item in block.items %}
    <article class="feature-card feature-card--{{ theme_component_presets.cards|default:'default' }}">
      <h3>
        {% if item.url %}
        <a href="{{ item.url }}" target="_blank" rel="noreferrer">{{ item.title }}</a>
        {% else %}
        {{ item.title }}
        {% endif %}
      </h3>
      <p>{{ item.text }}</p>
      {% if item.url %}
      <p><a href="{{ item.url }}" target="_blank" rel="noreferrer">{{ item.link_label|default:"View project" }}</a></p>
      {% endif %}
    </article>
    {% endfor %}
  </div>
</section>
