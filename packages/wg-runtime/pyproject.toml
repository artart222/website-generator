[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "wg-runtime"
version = "0.2.0"
description = "Django commerce runtime for website-generator."
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Artin Mobasher" }]
dependencies = [
  "wg-contracts==0.2.0",
  "asgiref==3.8.1",
  "celery==5.4.0",
  "Django==5.2.1",
  "djangorestframework==3.17.1",
  "djangorestframework-simplejwt==5.5.0",
  "redis==5.2.1",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["wg_runtime*"]
