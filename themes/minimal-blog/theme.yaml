name: minimal-blog
version: 1
engine: django
layouts:
  base: layouts/base.html
  document: layouts/document.html
  collection: layouts/collection.html
  not_found: layouts/404.html
assets:
  styles:
    base: styles/base.css
  static_dirs:
    - assets
tokens:
  colors:
    bg: "#1e2127"
    surface: "#282c34"
    text: "#abb2bf"
    muted: "#5c6370"
    # accent: "#61afef"
    accent: "#d19a66"
    accent-contrast: "#282c34"
    border: "#373c43"
  typography:
    body-family: "'Segoe UI', sans-serif"
    heading-family: "'Georgia', serif"
    font-size: "16px"
  spacing:
    container: "72rem"
    section: "4rem"
  radius:
    card: "24px"
    button: "999px"
  shadows:
    card: "0 18px 45px rgba(0, 0, 0, 0.30)"
presets:
  default:
    components:
      header: default
      footer: default
      cards: elevated
      blog_index: magazine
      post: prose
      buttons: rounded
  contrast:
    tokens:
      colors:
        bg: "#0f172a"
        surface: "#111827"
        text: "#f8fafc"
        muted: "#cbd5e1"
        accent: "#22c55e"
        accent-contrast: "#052e16"
        border: "#334155"
supports:
  blocks: true
  collection_index: true
blocks:
  core:
    - hero
    - rich_text
    - feature_grid
    - gallery
    - cta
    - faq
  custom:
    - minimal-blog/spotlight
