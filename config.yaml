version: 2

site:
  name: Bazaar Atelier
  description: Static-first storefront demo with runtime-ready checkout and Iranian payment adapter wiring.
  base_url: http://localhost:8000
  author: Artin Mobasher
  navigation:
    - title: Home
      type: index
    - title: Shop
      collection_index: shop
    - title: Order Status
      type: order-status
    - title: Journal
      collection_index: blog

content:
  source_directory: ./source
  data_dir: ./source/data
  collections:
    shop:
      path: ./source/shop
      type: product
      model: product
      route:
        prefix: shop
      layout: product
      defaults:
        layout: product
      index:
        enabled: true
        layout: collection
        output_path: shop/index.html
        title: Shop
        description: A static storefront catalog backed by runtime-ready checkout contracts.
    blog:
      path: ./source/blogs
      type: blog
      model: post
      route:
        prefix: blog
      layout: document
      defaults:
        layout: document
      index:
        enabled: true
        layout: collection
        output_path: blog/index.html
        title: Journal
        description: Notes about the static-first platform behind this demo.
    pages:
      path: ./source
      type: page
      model: page
      route:
        prefix: ""
      layout: document
      defaults:
        layout: document

theme:
  name: minimal-blog
  settings: ./theme.settings.yaml
  site_theme_dir: ./site-theme
  extra_css_urls:
    - /styles/code.css

build:
  output_directory: ./output
  asset_dirs:
    - ./source/assets
  template_engine: django
  log_level: 20

extensions:
  enabled:
    - wg-commerce
    - wg-seo
    - wg-sitemap

frontend:
  targets:
    - type: static_islands_bundle
      name: store-ui
      mount_base: /assets/frontend
  islands:
    - name: cart
      component: commerce/cart
    - name: checkout_button
      component: commerce/checkout_button
    - name: order_status
      component: commerce/order_status

runtime:
  targets:
    - name: commerce-api
      type: fastapi_service
      public_base_url: http://localhost:8787
      capabilities:
        - checkout
        - payment_callback
        - order_status

integrations:
  commerce:
    provider: wg-commerce
  payments:
    default: iran_gateway
    providers:
      iran_gateway:
        adapter: commerce.payment.ir.shaparak_like
        runtime_target: commerce-api
        currency: IRR
        callback_url: http://localhost:8787/payments/callback

plugins:
  - CollectionIndexerPlugin
  - SpecialPagesPlugin
  - PageKeyWordExtractor
  - SitemapPlugin

experimental:
  export_data:
    enabled: true
    output_dir: ./output/data
    include_collections: []
  react:
    enabled: false
    collection: shop
    app_dir: ./react-app
    export_subdir: shop
    base_path: /shop
    asset_prefix: /shop
  tailwind:
    enabled: false
    input: ./styles/tailwind.input.css
    output: ./styles/tailwind.css
    config: ./tailwind.config.js
    minify: false
