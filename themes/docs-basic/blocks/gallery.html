<section class="docs-card docs-gallery">
  {% if block.content.title %}<h2 class="block__title">{{ block.content.title }}</h2>{% endif %}
  <div class="docs-grid docs-gallery__grid">
    {% for item in block.items %}
    <article class="docs-grid__item docs-gallery__item">
      <img src="{{ item.image }}" alt="{{ item.alt|default:item.title }}">
      <p>{{ item.title }}</p>
    </article>
    {% endfor %}
  </div>
</section>
