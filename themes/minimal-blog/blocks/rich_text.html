<section class="block block--rich-text">
  {% if block.content.title %}
  <h2 class="block__title">{{ block.content.title }}</h2>
  {% endif %}
  {% if block.content.html %}
  <div class="prose">{{ block.content.html|safe }}</div>
  {% elif block.content.text %}
  <p class="block__text">{{ block.content.text }}</p>
  {% endif %}
</section>
