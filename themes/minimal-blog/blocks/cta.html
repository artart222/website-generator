<section class="block block--cta">
  <div class="cta-card">
    {% if block.content.title %}
    <h2 class="block__title">{{ block.content.title }}</h2>
    {% endif %}
    {% if block.content.text %}
    <p class="block__text">{{ block.content.text }}</p>
    {% endif %}
    {% if block.content.action %}
    <a href="{{ block.content.action.url }}" class="button">{{ block.content.action.label }}</a>
    {% endif %}
  </div>
</section>
