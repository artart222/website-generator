<section class="docs-card docs-faq">
  {% if block.content.title %}<h2 class="block__title">{{ block.content.title }}</h2>{% endif %}
  {% for item in block.items %}
  <article class="docs-grid__item docs-faq__item">
    <h3>{{ item.question }}</h3>
    <p>{{ item.answer }}</p>
  </article>
  {% endfor %}
</section>
