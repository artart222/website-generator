version: 1

site:
  name: artart222 Portfolio/Blog
  description: Portfolio and blog.
  base_url: artart222.github.io
  author: Artin Mobasher
  navigation:
    - title: Home
      type: index
    - title: Blog
      collection_index: blog
    - title: Shop
      collection_index: shop

content:
  source_directory: ./source
  data_dir: ./source/data
  collections:
    blog:
      path: ./source/blogs
      type: blog
      route:
        prefix: blog
      layout: document
      defaults:
        layout: document
      index:
        enabled: true
        layout: collection
        output_path: blog/index.html
        title: Blog
    pages:
      path: ./source
      type: page
      route:
        prefix: ""
      layout: document
      defaults:
        layout: document
    # shop:
    #   path: ./source/shop
    #   type: shop
    #   route:
    #     prefix: shop
    #   layout: document
    #   defaults:
    #     layout: document
    #   index:
    #     enabled: true
    #     layout: collection
    #     output_path: shop/index.html
    #     title: Shop

theme:
  name: minimal-blog
  # name: editorial-ledger
  # name: docs-basic
  # name: sunlit-notes
  # name: midnight-zine
  settings: ./theme.settings.yaml
  site_theme_dir: ./site-theme
  extra_css_urls:
    - /styles/code.css
  # name: docs-basic
  # settings: ./theme.settings.yaml
  # site_theme_dir: ./site-theme
  # extra_css_urls:
  #   - /styles/code.css


build:
  output_directory: ./output
  asset_dirs:
    - ./source/assets
  template_engine: django
  log_level: 10

plugins:
  - CollectionIndexerPlugin
  - SpecialPagesPlugin
  - PageKeyWordExtractor
  - SitemapPlugin

experimental:
  export_data:
    enabled: false
    output_dir: ./output/data
    include_collections: []
  react:
    enabled: false
    collection: shop
    app_dir: ./react-app
    export_subdir: shop
    base_path: /shop
    asset_prefix: /shop
  tailwind:
    enabled: false
    input: ./styles/tailwind.input.css
    output: ./styles/tailwind.css
    config: ./tailwind.config.js
    minify: false
